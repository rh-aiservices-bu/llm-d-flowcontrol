{{- if eq .Values.deploymentMethod "llmd" }}
apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  annotations:
    opendatahub.io/model-type: generative
    openshift.io/display-name: {{ .Values.modelDeployment.modelName }}
    {{- if eq .Values.llmd.flowControl true}}
    security.opendatahub.io/enable-auth: 'true'
    {{- else }}
    security.opendatahub.io/enable-auth: 'false'
    {{- end }}
    serving.kserve.io/stop: 'false'
  labels:
    app: llmd-demo
  name: {{ .Values.modelDeployment.modelName }}
  namespace: {{ .Values.llmd.namespace }}
spec:
  model:
    name: {{ trimPrefix "hf://" .Values.modelDeployment.modelUri }}
    uri: '{{ .Values.modelDeployment.modelUri }}'
  replicas: {{ .Values.modelDeployment.replicas }}
  router:
    gateway: {}
    route: {}
    scheduler:
      config:
        inline:
          apiVersion: inference.networking.x-k8s.io/v1alpha1
          {{- if eq .Values.llmd.flowControl true}}
          featureGates:
            - flowControl
          flowControl:
            defaultRequestTTL: 60s
            maxBytes: 1073741824
            priorityBands:
              - fairnessPolicyRef: round-robin-fairness-policy
                orderingPolicyRef: fcfs-ordering-policy
                priority: 0
              {{- range .Values.serviceAccounts }}
              - priority: {{ .priority }}
                orderingPolicyRef: fcfs-ordering-policy
                fairnessPolicyRef: round-robin-fairness-policy
              {{- end }}
          {{- end }}
          kind: EndpointPickerConfig
          plugins:
            - type: single-profile-handler
            - type: queue-scorer
            - type: active-request-scorer
            - type: prefix-cache-scorer
          {{- if eq .Values.llmd.flowControl true }}  
            - type: fcfs-ordering-policy
            - type: round-robin-fairness-policy
          {{- end }}
          schedulingProfiles:
            - name: default
              plugins:
                - pluginRef: queue-scorer
                  weight: 2
                - pluginRef: active-request-scorer
                  weight: 2
                - pluginRef: prefix-cache-scorer
                  weight: 3
      template:
        containers:
          - args:
              - '-v=4'
              - '--cert-path'
              - /var/run/kserve/tls
              - '--pool-group'
              - inference.networking.k8s.io
              - '--pool-name'
              - '{{ "{{" }} ChildName .ObjectMeta.Name `-inference-pool` {{ "}}" }}'
              - '--pool-namespace'
              - '{{ "{{" }} .ObjectMeta.Namespace {{ "}}" }}'
              - '--zap-encoder'
              - json
              - '--grpc-port'
              - '9002'
              - '--grpc-health-port'
              - '9003'
              - '--secure-serving'
              - '--model-server-metrics-scheme'
              - https
            env:
              - name: TOKENIZER_CACHE_DIR
                value: /tmp/tokenizer-cache
              - name: HF_HOME
                value: /tmp/tokenizer-cache
              - name: TRANSFORMERS_CACHE
                value: /tmp/tokenizer-cache
              - name: XDG_CACHE_HOME
                value: /tmp
            name: main
            resources: {}
            volumeMounts:
              - mountPath: /tmp/tokenizer-cache
                name: tokenizer-cache
              - mountPath: /cachi2
                name: cachi2-cache
        volumes:
          - emptyDir: {}
            name: tokenizer-cache
          - emptyDir: {}
            name: cachi2-cache
  template:
    containers:
      - env:
          - name: VLLM_ADDITIONAL_ARGS
            value: '--disable-uvicorn-access-log --max-model-len=16000'
        livenessProbe:
          failureThreshold: 5
          httpGet:
            path: /health
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 30
        name: main
        resources:
          limits:
            cpu: '4'
            memory: 8Gi
            nvidia.com/gpu: '1'
          requests:
            cpu: '4'
            memory: 8Gi
            nvidia.com/gpu: '1'
    tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
{{- end }}
